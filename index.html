<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">

    <title>Tecboard</title>

<body>
    <header>
        <img class="logo" src="img/logo-tecboard-branco.png" alt="Logo tecboard na cor branca">
        <img class="modeButton" src="img/light-mode-button.png" alt="Botão de light mode">
    </header>
    <main>
        <section>
            <h1 class="title"><span style="color: #9747FF;">Fique de olho</span><br>no que importa</h1>
            <p class="subTitle">
            Monitoramento em tempo real com alertas inteligentes para sua
            <br>
            aplicação sair do ar sem você saber
            </p>
            <div class="btnContainer">
                <button class="demoButton">Testar versão demo</button>
                <img class="image" src="img/celulares-sobrepostos-desktop.png" alt="celulares sobrepostos">
            </div>
            
        </section>
    </main>

<script src="index.js"></script>

</html>
